<!doctype html>
<!-- DEPRECATED: the Connect demo moved to the website. Remove as soon as the team is used to it. -->
<html lang="en">
  <head>
    <style>
      html,
      body,
      nlx-touchpoint {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
      }

      .config-form {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        max-width: 480px;
        margin: 60px auto;
        padding: 32px;
        background: #1a1a2e;
        border-radius: 12px;
        color: #e0e0e0;
      }

      .config-form h1 {
        font-size: 20px;
        margin: 0 0 8px;
        color: #fff;
      }

      .config-form p {
        font-size: 13px;
        color: #999;
        margin: 0 0 24px;
      }

      .config-form label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 4px;
        color: #aaa;
      }

      .config-form input {
        width: 100%;
        padding: 8px 12px;
        margin-bottom: 16px;
        border: 1px solid #333;
        border-radius: 6px;
        background: #0f0f1a;
        color: #fff;
        font-size: 14px;
        box-sizing: border-box;
      }

      .config-form input::placeholder {
        color: #555;
      }

      .config-form button {
        width: 100%;
        padding: 12px;
        background: #0972d3;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }

      .config-form button:hover {
        background: #0860b0;
      }
    </style>
    <meta charset="UTF-8" />
    <title>Touchpoint — Connect Chat Demo</title>
  </head>

  <body>
    <div id="config-screen" class="config-form">
      <h1>Connect Chat + Touchpoint</h1>
      <p>
        Enter your Amazon Connect details to launch a chat session powered by
        Touchpoint UI.
      </p>

      <label for="endpoint">API Gateway Endpoint URL</label>
      <input
        id="endpoint"
        type="text"
        placeholder="https://abc123.execute-api.us-east-1.amazonaws.com/Prod"
      />

      <label for="instanceId">Instance ID</label>
      <input
        id="instanceId"
        type="text"
        placeholder="11111111-1111-1111-1111-111111111111"
      />

      <label for="contactFlowId">Contact Flow ID</label>
      <input
        id="contactFlowId"
        type="text"
        placeholder="22222222-2222-2222-2222-222222222222"
      />

      <label for="displayName">Display Name</label>
      <input
        id="displayName"
        type="text"
        placeholder="Customer"
        value="Customer"
      />

      <label for="region">Region</label>
      <input
        id="region"
        type="text"
        placeholder="us-east-1"
        value="us-east-1"
      />

      <button id="start-btn">Start Chat</button>
    </div>

    <nlx-touchpoint id="touchpoint" style="display: none"></nlx-touchpoint>

    <script type="module">
       import { create } from "./src/index.tsx";

       const fields = [
         "endpoint",
         "instanceId",
         "contactFlowId",
         "displayName",
         "region",
       ];
       const defaults = { displayName: "Customer", region: "us-east-1" };
       const params = new URLSearchParams(window.location.search);
       fields.forEach((key) => {
         const value = params.get(key);
         if (value) document.getElementById(key).value = value;
       });

       fields.forEach((key) => {
         document.getElementById(key).addEventListener("input", () => {
           const url = new URL(window.location.href);
           fields.forEach((k) => {
             const v = document.getElementById(k).value.trim();
             if (v && v !== (defaults[k] || "")) url.searchParams.set(k, v);
             else url.searchParams.delete(k);
           });
           history.replaceState(null, "", url);
         });
       });

       document
         .getElementById("start-btn")
         .addEventListener("click", async () => {
           const endpoint = document.getElementById("endpoint").value.trim();
           const instanceId = document.getElementById("instanceId").value.trim();
           const contactFlowId = document
             .getElementById("contactFlowId")
             .value.trim();
           const displayName =
             document.getElementById("displayName").value.trim() || "Customer";
           const region =
             document.getElementById("region").value.trim() || "us-east-1";

           if (!endpoint) {
             alert("API Gateway Endpoint URL is required.");
             return;
           }

           // Hide config, show touchpoint
           document.getElementById("config-screen").style.display = "none";
           const tpEl = document.getElementById("touchpoint");
           tpEl.style.display = "block";
           tpEl.style.width = "100%";
           tpEl.style.height = "100%";

           // Import the adapter — it's in the sibling package
           const { createConnectChatConversation, fetchChatDetails } =
             await import("../../packages/connect-chat-adapter/src/index.ts");

           const conversationHandler = createConnectChatConversation({
             details: () =>
               fetchChatDetails(endpoint, {
                 instanceId,
                 contactFlowId,
                 participantDisplayName: displayName,
               }),
             region,
           });

           tpEl.touchpointConfiguration = {
             conversationHandler,
             config: {
               languageCode: "en-US",
             },
             windowSize: "half",
             colorMode: "dark",
             input: "text",
             chatMode: true,
             theme: {
               fontFamily:
                 '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif',
               accent: "#e8600a",
               primary: "rgb(255, 255, 255)",
               secondary: "rgb(0, 2, 9)",
               background: "rgba(0, 2, 9, 0.95)",

      initializeConversation: () => {
               // No-op: Connect Chat starts the flow on connection automatically
             },
           };
         });
    </script>
  </body>
</html>
